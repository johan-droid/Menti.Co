services:
  mongo:
    image: mongo:7
    container_name: mentico-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mentico-api
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      MONGO_URI: mongodb://mongo:27017/mentico
      JWT_SECRET: replace-me
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: mentico-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  mongo-data:
